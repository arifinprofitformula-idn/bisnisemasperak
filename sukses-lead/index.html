<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Berhasil - Langkah Selanjutnya</title>
    <meta name="description" content="Registrasi berhasil! Lanjutkan dengan menonton teaser dan bergabung ke grup WhatsApp komunitas.">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #FFD700;
            --gold-dark: #DAA520;
            --gold-gradient: linear-gradient(45deg, #DAA520, #FFD700);
            --silver: #C0C0C0;
            --silver-dark: #A9A9A9;
            --bg-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 25%, #C0C0C0 75%, #A9A9A9 100%);
            --white: #FFFFFF;
            --text: #333333;
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', Arial, sans-serif;
            color: var(--text);
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(218,165,32,0.2);
            border-radius: 20px;
            box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.3);
            overflow: hidden;
        }
        .top-bar {
            height: 4px;
            background: var(--gold-gradient);
        }
        .content {
            padding: 28px;
        }
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin: 0 0 16px 0;
            color: var(--text);
        }
        .subtext {
            text-align: center;
            color: #555;
            margin-bottom: 24px;
        }
        .video-wrap {
            position: relative;
            padding-top: 56.25%; /* 16:9 */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border: 1px solid rgba(218,165,32,0.25);
            background: #000;
        }
        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 22px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #111;
            font-weight: 700;
            padding: 12px 18px;
            border-radius: 12px;
            transition: all .25s ease;
            box-shadow: 0 6px 16px rgba(218,165,32,0.25);
        }
        .btn-login {
            background: linear-gradient(45deg, #2E8B57, #3CB371);
            border: 2px solid rgba(46,139,87,0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(46,139,87,0.35);
        }
        .btn-wa {
            background: var(--gold-gradient);
            border: 2px solid rgba(218,165,32,0.35);
        }
        .btn-wa:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(218,165,32,0.35);
        }
        .footer-note {
            text-align: center;
            font-size: .95rem;
            color: #666;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .headline { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar"></div>
        <div class="content">
            <h1 class="headline">Registrasi Berhasil — Langkah Selanjutnya</h1>
            <p class="subtext">Tonton teaser singkat, lalu bergabung dengan komunitas WhatsApp atau login untuk mulai eksplorasi.</p>

            <!-- Video teaser YouTube: ganti VIDEO_ID di bawah dengan ID video Anda -->
            <div class="video-wrap" aria-label="Video teaser">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video teaser" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>

            <div class="actions">
                <!-- Kiri: LOGIN -->
                <a class="btn btn-login" href="../login">
                    <i class="fas fa-sign-in-alt"></i>
                    LOGIN
                </a>
                <!-- Kanan: Join Grup WhatsApp (ganti href dengan link grup WA Anda) -->
                <a class="btn btn-wa" href="https://chat.whatsapp.com/GRUP_CODE_ANDA" target="_blank" rel="noopener">
                    <i class="fab fa-whatsapp"></i>
                    Join Grup WhatsApp
                </a>
            </div>

            <p class="footer-note">Tip: Simpan halaman ini bila Anda ingin menonton teaser lagi atau bergabung ke grup kapan pun.</p>
        </div>
    </div>
    <script>
      // Opsional: jika email tersimpan di localStorage dari proses registrasi sebelumnya, Anda bisa menambahkannya ke query di sini
      // const email = localStorage.getItem('registeredEmail');
    </script>
</body>
</html>
